<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Samudhra Tech Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&family=Open+Sans:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700;800&family=Lato:wght@300;400;700&family=Nunito:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="page-wrapper">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">ST</div>
        <div class="sidebar-brand">Samudhra <span>Tech</span></div>
      </div>
      <div class="sidebar-body">
        <div class="sidebar-section-title">Main Menu</div>
        <nav class="sidebar-nav">
          <a href="dashboard.html" class="sidebar-link"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
          <a href="students.html" class="sidebar-link"><i class="fas fa-user-graduate"></i><span>Students</span></a>
          <a href="templates.html" class="sidebar-link"><i class="fas fa-layer-group"></i><span>Templates</span></a>
          <a href="generate.html" class="sidebar-link"><i class="fas fa-certificate"></i><span>Generate</span></a>
          <a href="verification.html" class="sidebar-link"><i class="fas fa-check-double"></i><span>Verification</span></a>
          <a href="reports.html" class="sidebar-link"><i class="fas fa-chart-bar"></i><span>Reports</span></a>
        </nav>
        <div class="sidebar-section-title">Other</div>
        <nav class="sidebar-nav">
          <a href="settings.html" class="sidebar-link"><i class="fas fa-cog"></i><span>Settings</span></a>
          <a href="profile.html" class="sidebar-link active"><i class="fas fa-user-circle"></i><span>Profile</span></a>
        </nav>
      </div>
      <div class="sidebar-footer">
        <a href="login.html" class="sidebar-link" onclick="Utils.removeFromStorage('currentUser')"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="main-content" id="mainContent">
      <nav class="navbar" id="navbar">
        <div class="navbar-left">
          <button class="navbar-toggle" id="mobileMenuToggle"><i class="fas fa-bars"></i></button>
          <button class="navbar-toggle" id="sidebarToggle"><i class="fas fa-chevron-left"></i></button>
          <div class="navbar-search"><i class="fas fa-search"></i><input type="text" placeholder="Search..."></div>
        </div>
        <div class="navbar-right">
          <button class="navbar-btn" id="mobileSearchToggle"><i class="fas fa-search"></i></button>
          <button class="navbar-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
          <button class="navbar-btn"><i class="fas fa-bell"></i><span class="notification-dot"></span></button>
          <div class="navbar-profile">
            <div class="avatar-placeholder">A</div>
            <div class="navbar-profile-info">
              <div class="navbar-profile-name">Admin User</div>
              <div class="navbar-profile-role">Administrator</div>
            </div>
          </div>
        </div>
      </nav>

      <div class="page-content">
        <div class="breadcrumb">
          <a href="dashboard.html">Dashboard</a>
          <span class="separator"><i class="fas fa-chevron-right"></i></span>
          <span>Profile</span>
        </div>

        <div class="profile-header">
          <div class="profile-avatar-lg" id="profileAvatar">A</div>
          <div class="profile-info">
            <h1 id="profileDisplayName">Admin User</h1>
            <p id="profileDisplayEmail">admin@samudhratech.com</p>
            <p id="profileDisplayPhone" style="font-size:14px;margin-top:4px">+91 98765 43210</p>
          </div>
          <button class="btn btn-secondary" style="margin-left:auto" id="editProfileBtn"><i class="fas fa-edit"></i> Edit Profile</button>
        </div>

        <div class="grid-2">
          <div class="card">
            <div class="card-header">
              <div class="card-title"><i class="fas fa-user-edit" style="color:var(--primary)"></i> Edit Profile</div>
            </div>
            <form id="profileForm">
              <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-input" id="profileName" placeholder="Admin User">
              </div>
              <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" id="profileEmail" placeholder="admin@samudhratech.com">
              </div>
              <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update Profile</button>
            </form>
          </div>

          <div class="card">
            <div class="card-header">
              <div class="card-title"><i class="fas fa-key" style="color:var(--primary)"></i> Change Password</div>
            </div>
            <form id="passwordForm">
              <div class="form-group">
                <label class="form-label">Current Password</label>
                <input type="password" class="form-input" id="currentPassword" placeholder="Enter current password">
              </div>
              <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" class="form-input" id="newPassword" placeholder="Enter new password">
              </div>
              <div class="form-group">
                <label class="form-label">Confirm New Password</label>
                <input type="password" class="form-input" id="confirmPassword" placeholder="Confirm new password">
              </div>
              <button type="submit" class="btn btn-primary"><i class="fas fa-key"></i> Change Password</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
