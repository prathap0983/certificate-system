<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Samudhra Tech Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&family=Open+Sans:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700;800&family=Lato:wght@300;400;700&family=Nunito:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="floating-shapes">
    <div class="floating-shape"></div>
    <div class="floating-shape"></div>
    <div class="floating-shape"></div>
  </div>
  <div class="login-page">
    <div class="login-container">
      <div class="login-left">
        <div class="login-left-content">
          <div class="company-logo">ST</div>
          <h1>Samudhra Tech Solutions</h1>
          <p>Enterprise-grade certificate management platform. Generate, manage, and verify digital certificates with security and scale.</p>
        </div>
      </div>
      <div class="login-right">
        <h2>Admin Login</h2>
        <p class="subtitle">Sign in to access the dashboard</p>
        <form id="loginForm">
          <div class="form-group">
            <label class="form-label" for="loginEmail">Email Address</label>
            <input type="email" id="loginEmail" class="form-input" placeholder="Enter your email" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="loginPassword">Password</label>
            <div class="password-wrapper">
              <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required>
              <button type="button" class="password-toggle" id="passwordToggle"><i class="fas fa-eye"></i></button>
            </div>
          </div>
          <div class="login-options">
            <label class="checkbox-wrapper">
              <input type="checkbox" checked> Remember Me
            </label>
            <a href="#" class="forgot-link">Forgot Password?</a>
          </div>
          <button type="submit" class="btn btn-primary btn-lg btn-block">Sign In</button>
        </form>
        <p style="text-align:center;margin-top:24px;font-size:13px;color:var(--text-muted)">
          <i class="fas fa-shield-alt"></i> Secured with encryption
        </p>
      </div>
    </div>
  </div>

  <div class="loading-screen" id="loadingScreen">
    <div class="loading-screen-logo">ST</div>
    <div class="loading-screen-text">Samudhra Tech Solutions</div>
    <div class="loading-dots">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="js/utils.js"></script>
  <script>
    const Login = {
      init() {
        this.setupPasswordToggle();
        this.setupForm();
        this.checkSession();
      },
      setupPasswordToggle() {
        const toggle = document.getElementById('passwordToggle');
        const password = document.getElementById('loginPassword');
        if (toggle && password) {
          toggle.addEventListener('click', () => {
            const type = password.type === 'password' ? 'text' : 'password';
            password.type = type;
            toggle.querySelector('i').className = type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
          });
        }
      },
      setupForm() {
        const form = document.getElementById('loginForm');
        if (form) {
          form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!email) { showToast('Error', 'Please enter your email', 'error'); return; }
            if (!password) { showToast('Error', 'Please enter your password', 'error'); return; }
            if (!Utils.isValidEmail(email)) { showToast('Error', 'Please enter a valid email', 'error'); return; }
            
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalBtnHtml = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In...';
            
            try {
              const session = await Api.login(email, password);
              const user = { id: session.id, name: session.name, email: session.email, role: session.role };
              Utils.setToStorage('authToken', session.token);
              Utils.setToStorage('currentUser', user);
              showToast('Success', 'Welcome back, Admin!', 'success');
              setTimeout(() => Utils.navigateTo('dashboard.html'), 800);
            } catch (error) {
              showToast('Error', error.message || 'Login failed', 'error');
              submitBtn.disabled = false;
              submitBtn.innerHTML = originalBtnHtml;
            }
          });
        }
      },
      checkSession() {
        if (Utils.getFromStorage('currentUser')) {
          Utils.navigateTo('dashboard.html');
        }
      }
    };
  </script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
