<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Preview - Samudhra Tech Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&family=Open+Sans:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700;800&family=Lato:wght@300;400;700&family=Nunito:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .preview-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; background: linear-gradient(135deg, var(--bg) 0%, var(--primary-bg) 100%); }
    .preview-actions { display: flex; gap: 12px; margin-top: 32px; flex-wrap: wrap; justify-content: center; }
    .preview-container { max-width: 900px; width: 100%; }
  </style>
</head>
<body>
  <div class="preview-page">
    <div class="preview-container">
      <div style="text-align:center;margin-bottom:24px">
        <h1 class="page-title">Certificate <span>Preview</span></h1>
        <p style="color:var(--text-muted)">Review and download the generated certificate</p>
      </div>

      <div id="livePreview">
        <div style="text-align:center;padding:48px;color:var(--text-muted)">
          <i class="fas fa-spinner fa-spin" style="font-size:32px;margin-bottom:16px;color:var(--primary)"></i>
          <p>Loading certificate preview...</p>
        </div>
      </div>

      <div class="preview-actions">
        <button class="btn btn-primary btn-lg" id="downloadCertificate"><i class="fas fa-download"></i> Download PDF</button>
        <button class="btn btn-secondary btn-lg" id="printCertificate"><i class="fas fa-print"></i> Print</button>
        <button class="btn btn-outline btn-lg" onclick="window.history.back()"><i class="fas fa-arrow-left"></i> Back</button>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/certificate.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
