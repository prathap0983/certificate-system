version: "3.8"

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: certificate_system
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    image: maven:3.9.4-eclipse-temurin-25
    working_dir: /workspace
    volumes:
      - ./certificate-system:/workspace
    command: mvn -f pom.xml spring-boot:run
    environment:
      DB_URL: jdbc:mysql://db:3306/certificate_system?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: root
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  db_data: {}
